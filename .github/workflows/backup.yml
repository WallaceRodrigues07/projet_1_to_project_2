name: Supabase Migration Sync

on:
  workflow_dispatch: # pode rodar manualmente
  push:
    paths:
      - "supabase/migrations/**" # dispara quando migrations mudarem

jobs:
  migrate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v3

      - name: Instalar Supabase CLI
        run: npm install -g supabase@latest

      - name: Configurar Supabase Project Destino
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_DEST }} --password ${{ secrets.SUPABASE_DB_PASS }}

      - name: Tentar aplicar migrações
        id: migrate
        continue-on-error: true
        run: |
          set -e
          echo "🔄 Aplicando migrações..."
          supabase db push --include-all -p ${{ secrets.SUPABASE_DB_PASS }}

      - name: Resolver inconsistências (se falhou)
        if: steps.migrate.outcome == 'failure'
        run: |
          echo "⚠️ Erro ao aplicar migrações. Tentando reparar..."
          # Identificar a última migração no erro
          MIGRATION=$(supabase migration list | grep "remote" | tail -n1 | awk '{print $1}')
          
          if [ -n "$MIGRATION" ]; then
            supabase migration repair --status reverted $MIGRATION
          fi

          echo "🔄 Tentando novamente aplicar migrações..."
          supabase db push --include-all -p ${{ secrets.SUPABASE_DB_PASS }}
