name: Supabase Homologation

on:
  workflow_dispatch:

jobs:
  homologation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3

        
      - name: Login to Supabase
        run: npx supabase login --token ${{ secrets.SUPABASE_TOKEN }}

      - name: Link Project Y -1
        run: npx supabase link --project-ref ${{ secrets.PROJECT_Y_REF_ID }} -p ${{ secrets.PROJECT_Y_API_KEY }}

      - name: Pull Project Y -1
        run: npx supabase db pull -p ${{ secrets.PROJECT_Y_API_KEY }}

      - name: Link Project X
        run: npx supabase link --project-ref ${{ secrets.PROJECT_X_REF_ID }} -p ${{ secrets.PROJECT_X_API_KEY }}

      - name: Pull Project X schema
        run: npx supabase db pull -p ${{ secrets.PROJECT_X_API_KEY }}

      - name: Link Project Y -2
        run: npx supabase link --project-ref ${{ secrets.PROJECT_Y_REF_ID }} -p ${{ secrets.PROJECT_Y_API_KEY }}

      - name: Push schema to Project Y
        run: npx supabase db push -p ${{ secrets.PROJECT_Y_API_KEY }} --yes
